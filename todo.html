<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Задачи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">YourGift</div>
        <div class="user">👤</div>
    </header>

    <main>
        <h1>Мои задачи</h1>
        
        <form id="toDoForm" style="max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px;">
            <input type="text" name="title" placeholder="Название задачи" required style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <input type="date" name="date" required style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <button type="button" onclick="addToDo()" style="padding: 10px 30px; background: #000; color: #fff; border: none; cursor: pointer;">Добавить</button>
            <button type="button" onclick="deleteSelected()" style="padding: 10px 30px; background: #dc3545; color: #fff; border: none; cursor: pointer; margin-left: 10px;">Удалить выделенные</button>
        </form>

        <div id="toDoContainer" style="max-width: 800px; margin: 30px auto;"></div>
    </main>

    <footer class="footer">
        <div class="logo">YourGift</div>
        <p>YourGift © 2026</p>
    </footer>

    <script src="todo.js"></script>
</body>
</html>
